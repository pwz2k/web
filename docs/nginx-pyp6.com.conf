# Copy to the server, e.g.:
#   sudo nano /etc/nginx/sites-available/pyp6
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name pyp6.com www.pyp6.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pyp6.com www.pyp6.com;

    ssl_certificate /etc/letsencrypt/live/pyp6.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pyp6.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # NextAuth / large Cookie headers (avoids 400 Request Header Or Cookie Too Large)
    large_client_header_buffers 4 32k;

    # Adjust if you upload large files through this host (not direct to UploadThing)
    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
